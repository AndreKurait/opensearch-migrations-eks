<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <style>
    text { font-family: Inter, system-ui, sans-serif; }
    .box { rx: 10; ry: 10; stroke-width: 1.5; }
    .title { font-size: 14px; font-weight: 600; }
    .sub { font-size: 11px; opacity: 0.6; }
    .group { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }
    .arrow { stroke-width: 2; fill: none; }
    .arrow-tip { stroke: none; }
    @media (prefers-color-scheme: dark) {
      .bg { fill: #0d1117; }
      .k8s-border { stroke: #1f3d5c; }
      .argo-border { stroke: #1a3050; }
      .box-internal { fill: #161b22; stroke: #30363d; }
      .box-worker { fill: #0d1f3c; stroke: #1a5fb4; }
      .box-external { fill: #161b22; stroke: #484f58; }
      .box-target { fill: #0d1f3c; stroke: #1a5fb4; }
      .title { fill: #e6edf3; }
      .sub { fill: #8b949e; }
      .group { fill: #6e7681; }
      .arrow-ctrl { stroke: #484f58; }
      .arrow-data { stroke: #1a5fb4; stroke-dasharray: 6 3; }
      .arrow-tip-ctrl { fill: #484f58; }
      .arrow-tip-data { fill: #1a5fb4; }
      .step-bg { fill: #1a5fb4; }
      .step-num { fill: #fff; font-size: 11px; font-weight: 700; }
      .legend { fill: #6e7681; font-size: 10px; }
    }
    @media (prefers-color-scheme: light) {
      .bg { fill: #ffffff; }
      .k8s-border { stroke: #b0c4de; }
      .argo-border { stroke: #c8d8e8; }
      .box-internal { fill: #f6f8fa; stroke: #d0d7de; }
      .box-worker { fill: #e8f0fe; stroke: #1a5fb4; }
      .box-external { fill: #f6f8fa; stroke: #d0d7de; }
      .box-target { fill: #e8f0fe; stroke: #1a5fb4; }
      .title { fill: #1f2328; }
      .sub { fill: #656d76; }
      .group { fill: #656d76; }
      .arrow-ctrl { stroke: #afb8c1; }
      .arrow-data { stroke: #1a5fb4; stroke-dasharray: 6 3; }
      .arrow-tip-ctrl { fill: #afb8c1; }
      .arrow-tip-data { fill: #1a5fb4; }
      .step-bg { fill: #1a5fb4; }
      .step-num { fill: #fff; font-size: 11px; font-weight: 700; }
      .legend { fill: #656d76; font-size: 10px; }
    }
  </style>

  <!-- Background -->
  <rect width="800" height="480" class="bg"/>

  <!-- Kubernetes Cluster -->
  <rect x="140" y="20" width="520" height="330" rx="14" fill="none" class="k8s-border" stroke-width="2" stroke-dasharray="8 4"/>
  <text x="160" y="42" class="group">Kubernetes Cluster · namespace: ma</text>

  <!-- Top row: Console, Argo, Monitoring -->
  <rect x="160" y="58" width="140" height="52" class="box box-internal"/>
  <text x="230" y="82" class="title" text-anchor="middle">Migration Console</text>
  <text x="230" y="98" class="sub" text-anchor="middle">StatefulSet</text>

  <rect x="320" y="58" width="140" height="52" class="box box-internal"/>
  <text x="390" y="82" class="title" text-anchor="middle">Argo Workflows</text>
  <text x="390" y="98" class="sub" text-anchor="middle">Server + Controller</text>

  <rect x="480" y="58" width="160" height="52" class="box box-internal"/>
  <text x="560" y="82" class="title" text-anchor="middle">Monitoring</text>
  <text x="560" y="98" class="sub" text-anchor="middle">OTel · Grafana</text>

  <!-- Argo-managed zone -->
  <rect x="160" y="130" width="480" height="200" rx="10" fill="none" class="argo-border" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="180" y="148" class="group">Managed by Argo Workflows</text>

  <!-- Worker boxes -->
  <rect x="175" y="165" width="135" height="55" class="box box-worker"/>
  <text x="242" y="189" class="title" text-anchor="middle">RFS Workers</text>
  <text x="242" y="206" class="sub" text-anchor="middle">Jobs · 1 per shard</text>

  <rect x="332" y="165" width="135" height="55" class="box box-worker"/>
  <text x="400" y="189" class="title" text-anchor="middle">Capture Proxy</text>
  <text x="400" y="206" class="sub" text-anchor="middle">Deployment + Svc</text>

  <rect x="490" y="165" width="135" height="55" class="box box-worker"/>
  <text x="557" y="189" class="title" text-anchor="middle">Traffic Replayer</text>
  <text x="557" y="206" class="sub" text-anchor="middle">Deployment</text>

  <!-- Kafka -->
  <rect x="332" y="250" width="135" height="50" class="box box-internal"/>
  <text x="400" y="273" class="title" text-anchor="middle">Kafka</text>
  <text x="400" y="289" class="sub" text-anchor="middle">Strimzi / external</text>

  <!-- External: Clients -->
  <rect x="20" y="55" width="100" height="44" class="box box-external"/>
  <text x="70" y="82" class="title" text-anchor="middle">Clients</text>

  <!-- External: Source -->
  <rect x="20" y="170" width="100" height="50" class="box box-external"/>
  <text x="70" y="193" class="title" text-anchor="middle">Source</text>
  <text x="70" y="208" class="sub" text-anchor="middle">ES / OpenSearch</text>

  <!-- External: Object Storage -->
  <rect x="20" y="370" width="100" height="50" class="box box-external"/>
  <text x="70" y="393" class="title" text-anchor="middle">Object Storage</text>
  <text x="70" y="408" class="sub" text-anchor="middle">S3 / GCS / MinIO</text>

  <!-- External: Target -->
  <rect x="680" y="170" width="100" height="50" class="box box-target"/>
  <text x="730" y="193" class="title" text-anchor="middle">Target</text>
  <text x="730" y="208" class="sub" text-anchor="middle">OpenSearch</text>

  <!-- Arrows -->
  <!-- Clients → Proxy -->
  <line x1="120" y1="77" x2="332" y2="185" class="arrow arrow-ctrl"/>
  <polygon points="332,185 322,180 324,188" class="arrow-tip arrow-tip-ctrl"/>

  <!-- Proxy → Source (pass-through) -->
  <line x1="332" y1="198" x2="120" y2="195" class="arrow arrow-ctrl"/>
  <polygon points="120,195 130,190 128,198" class="arrow-tip arrow-tip-ctrl"/>

  <!-- Proxy → Kafka -->
  <line x1="400" y1="220" x2="400" y2="250" class="arrow arrow-ctrl"/>
  <polygon points="400,250 396,240 404,240" class="arrow-tip arrow-tip-ctrl"/>

  <!-- Kafka → Replayer -->
  <line x1="467" y1="275" x2="557" y2="220" class="arrow arrow-ctrl"/>
  <polygon points="557,220 547,222 551,230" class="arrow-tip arrow-tip-ctrl"/>

  <!-- Source → Snapshot (data) -->
  <line x1="70" y1="220" x2="70" y2="370" class="arrow arrow-data"/>
  <polygon points="70,370 66,360 74,360" class="arrow-tip arrow-tip-data"/>
  <text x="82" y="300" class="sub" transform="rotate(-90 82 300)">snapshot</text>

  <!-- Snapshot → RFS (data) -->
  <path d="M120,395 L242,395 L242,220" class="arrow arrow-data"/>
  <polygon points="242,220 238,230 246,230" class="arrow-tip arrow-tip-data"/>
  <text x="170" y="388" class="sub">Lucene files</text>

  <!-- RFS → Target (data) -->
  <path d="M310,190 L680,190" class="arrow arrow-data"/>
  <polygon points="680,190 670,186 670,194" class="arrow-tip arrow-tip-data"/>
  <text x="490" y="183" class="sub">bulk index</text>

  <!-- Replayer → Target -->
  <line x1="625" y1="192" x2="680" y2="192" class="arrow arrow-ctrl"/>
  <polygon points="680,192 670,188 670,196" class="arrow-tip arrow-tip-ctrl"/>

  <!-- Legend -->
  <line x1="680" y1="420" x2="710" y2="420" class="arrow arrow-data"/>
  <text x="718" y="424" class="legend">Data flow</text>
  <line x1="680" y1="440" x2="710" y2="440" class="arrow arrow-ctrl"/>
  <text x="718" y="444" class="legend">Control flow</text>
</svg>
