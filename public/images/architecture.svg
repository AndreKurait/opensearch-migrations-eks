<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 580" fill="none">
  <style>
    :root { color-scheme: light dark; }
    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    .bg-main { fill: light-dark(#f8fafc, #0f1724); }
    .border-cluster { stroke: light-dark(#93c5fd, #1e3a5f); }
    .fill-cluster-bg { fill: light-dark(rgba(59,130,246,0.03), rgba(59,130,246,0.04)); }
    .fill-card { fill: light-dark(#ffffff, #1a2744); }
    .border-card { stroke: light-dark(#d1d9e6, #2d4a6f); }
    .fill-card-accent { fill: light-dark(#eff6ff, #0d2847); }
    .border-accent { stroke: light-dark(#3b82f6, #3b82f6); }
    .fill-external { fill: light-dark(#f9fafb, #1c1c2e); }
    .border-external { stroke: light-dark(#9ca3af, #475569); }
    .fill-managed-bg { fill: light-dark(rgba(59,130,246,0.04), rgba(0,94,184,0.06)); }
    .border-managed { stroke: light-dark(#bfdbfe, #1e3a5f); }
    .fill-target { fill: light-dark(#f0fdf4, #0d2a1a); }
    .border-target { stroke: light-dark(#22c55e, #16a34a); }

    .label { font-size: 13px; fill: light-dark(#1e293b, #e2e8f0); font-weight: 600; }
    .sublabel { font-size: 10px; fill: light-dark(#64748b, #94a3b8); }
    .group-label { font-size: 11px; fill: light-dark(#3b82f6, #60a5fa); font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; }
    .managed-label { font-size: 10px; fill: light-dark(#6b7280, #64748b); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .step-num { font-size: 9.5px; fill: #ffffff; font-weight: 700; }
    .legend-text { font-size: 10.5px; fill: light-dark(#475569, #94a3b8); }
    .legend-title { font-size: 10.5px; fill: light-dark(#374151, #cbd5e1); font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
    .flow-label { font-size: 9.5px; fill: light-dark(#2563eb, #60a5fa); font-weight: 500; }
    .ctrl-label { font-size: 9.5px; fill: light-dark(#64748b, #64748b); font-weight: 500; }

    .arrow-control {
      stroke: light-dark(#94a3b8, #475569);
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#ah-ctrl);
    }
    .arrow-data {
      stroke: light-dark(#2563eb, #3b82f6);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 7 4;
      marker-end: url(#ah-data);
    }
    .arrow-ctrl-color { fill: light-dark(#94a3b8, #475569); }
    .arrow-data-color { fill: light-dark(#2563eb, #3b82f6); }

    .shadow-card { filter: url(#card-shadow); }
    .shadow-accent { filter: url(#accent-shadow); }
  </style>

  <defs>
    <marker id="ah-ctrl" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" class="arrow-ctrl-color"/>
    </marker>
    <marker id="ah-data" markerWidth="9" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <path d="M0,0.5 L8,3.5 L0,6.5" class="arrow-data-color"/>
    </marker>
    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="grad-green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#16a34a"/>
      <stop offset="100%" stop-color="#0d9488"/>
    </linearGradient>
    <filter id="card-shadow" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="2.5" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="accent-shadow" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#2563eb" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- BACKGROUND -->
  <rect width="960" height="580" rx="14" class="bg-main"/>

  <!-- KUBERNETES CLUSTER BOUNDARY -->
  <rect x="192" y="30" width="575" height="402" rx="14" class="fill-cluster-bg"/>
  <rect x="192" y="30" width="575" height="402" rx="14" fill="none" class="border-cluster" stroke-width="2" stroke-dasharray="10 5"/>
  <text x="212" y="52" class="group-label">Kubernetes Cluster</text>

  <!-- ======== EXTERNAL NODES ======== -->

  <!-- Clients -->
  <g>
    <rect x="36" y="72" width="120" height="50" rx="10" class="fill-external shadow-card"/>
    <rect x="36" y="72" width="120" height="50" rx="10" class="border-external" fill="none" stroke-width="1.5"/>
    <text x="96" y="102" class="label" text-anchor="middle">Clients</text>
  </g>

  <!-- Source -->
  <g>
    <rect x="36" y="230" width="120" height="64" rx="10" class="fill-external shadow-card"/>
    <rect x="36" y="230" width="120" height="64" rx="10" class="border-external" fill="none" stroke-width="1.5"/>
    <text x="96" y="258" class="label" text-anchor="middle">Source</text>
    <text x="96" y="274" class="sublabel" text-anchor="middle">ES / OpenSearch</text>
  </g>

  <!-- Object Storage -->
  <g>
    <rect x="36" y="460" width="120" height="64" rx="10" class="fill-external shadow-card"/>
    <rect x="36" y="460" width="120" height="64" rx="10" class="border-external" fill="none" stroke-width="1.5"/>
    <text x="96" y="488" class="label" text-anchor="middle">Object Storage</text>
    <text x="96" y="504" class="sublabel" text-anchor="middle">S3 / GCS / MinIO</text>
  </g>

  <!-- Target -->
  <g>
    <rect x="800" y="188" width="130" height="64" rx="10" class="fill-target shadow-accent"/>
    <rect x="800" y="188" width="130" height="64" rx="10" fill="none" stroke="url(#grad-green)" stroke-width="2"/>
    <text x="865" y="216" class="label" text-anchor="middle">Target</text>
    <text x="865" y="232" class="sublabel" text-anchor="middle">OpenSearch</text>
  </g>

  <!-- ======== TOP ROW: Console, Argo, Monitoring ======== -->

  <!-- Migration Console -->
  <g>
    <rect x="218" y="68" width="150" height="56" rx="10" class="fill-card shadow-card"/>
    <rect x="218" y="68" width="150" height="56" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="293" y="92" class="label" text-anchor="middle">Migration Console</text>
    <text x="293" y="110" class="sublabel" text-anchor="middle">StatefulSet · CLI</text>
  </g>

  <!-- Argo Workflows -->
  <g>
    <rect x="396" y="68" width="150" height="56" rx="10" class="fill-card shadow-card"/>
    <rect x="396" y="68" width="150" height="56" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="471" y="92" class="label" text-anchor="middle">Argo Workflows</text>
    <text x="471" y="110" class="sublabel" text-anchor="middle">Server + Controller</text>
  </g>

  <!-- Monitoring -->
  <g>
    <rect x="574" y="68" width="150" height="56" rx="10" class="fill-card shadow-card"/>
    <rect x="574" y="68" width="150" height="56" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="649" y="92" class="label" text-anchor="middle">Monitoring</text>
    <text x="649" y="110" class="sublabel" text-anchor="middle">OTel · Grafana</text>
  </g>

  <!-- Console → Argo -->
  <path d="M368,96 L396,96" class="arrow-control"/>

  <!-- ======== MANAGED BY ARGO REGION ======== -->
  <rect x="218" y="150" width="530" height="264" rx="10" class="fill-managed-bg border-managed" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="238" y="170" class="managed-label">Managed by Argo Workflows</text>

  <!-- RFS Workers -->
  <g>
    <rect x="240" y="192" width="136" height="66" rx="10" class="fill-card-accent shadow-accent"/>
    <rect x="240" y="192" width="136" height="66" rx="10" fill="none" class="border-accent" stroke-width="2"/>
    <text x="308" y="220" class="label" text-anchor="middle">RFS Workers</text>
    <text x="308" y="238" class="sublabel" text-anchor="middle">Jobs · 1 per shard</text>
  </g>

  <!-- Capture Proxy -->
  <g>
    <rect x="240" y="290" width="136" height="66" rx="10" class="fill-card-accent shadow-accent"/>
    <rect x="240" y="290" width="136" height="66" rx="10" fill="none" class="border-accent" stroke-width="2"/>
    <text x="308" y="318" class="label" text-anchor="middle">Capture Proxy</text>
    <text x="308" y="336" class="sublabel" text-anchor="middle">Deployment + Svc</text>
  </g>

  <!-- Traffic Replayer -->
  <g>
    <rect x="556" y="290" width="148" height="66" rx="10" class="fill-card-accent shadow-accent"/>
    <rect x="556" y="290" width="148" height="66" rx="10" fill="none" class="border-accent" stroke-width="2"/>
    <text x="630" y="318" class="label" text-anchor="middle">Traffic Replayer</text>
    <text x="630" y="336" class="sublabel" text-anchor="middle">Deployment</text>
  </g>

  <!-- Kafka -->
  <g>
    <rect x="400" y="290" width="130" height="66" rx="10" class="fill-card shadow-card"/>
    <rect x="400" y="290" width="130" height="66" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="465" y="318" class="label" text-anchor="middle">Kafka</text>
    <text x="465" y="336" class="sublabel" text-anchor="middle">Strimzi / external</text>
  </g>

  <!-- ======== DATA FLOW ARROWS (blue dashed) ======== -->

  <!-- ① Source → Object Storage (snapshot) -->
  <path d="M96,294 L96,460" class="arrow-data"/>
  <circle cx="96" cy="380" r="11" fill="url(#grad-blue)"/>
  <text x="96" y="384" class="step-num" text-anchor="middle">1</text>
  <text x="110" y="406" class="flow-label">snapshot</text>

  <!-- ② Object Storage → RFS Workers -->
  <path d="M156,492 L220,492 L220,440 L308,440 L308,258" class="arrow-data"/>
  <circle cx="308" cy="440" r="11" fill="url(#grad-blue)"/>
  <text x="308" y="444" class="step-num" text-anchor="middle">2</text>
  <text x="240" y="485" class="flow-label">Lucene files</text>

  <!-- ③ RFS Workers → Target (bulk index) -->
  <path d="M376,220 L800,220" class="arrow-data"/>
  <circle cx="588" cy="220" r="11" fill="url(#grad-blue)"/>
  <text x="588" y="224" class="step-num" text-anchor="middle">3</text>
  <text x="500" y="212" class="flow-label">bulk index</text>

  <!-- ④ Traffic Replayer → Target (replay) -->
  <path d="M704,323 L770,323 L770,236 L800,236" class="arrow-data"/>
  <circle cx="770" cy="280" r="11" fill="url(#grad-blue)"/>
  <text x="770" y="284" class="step-num" text-anchor="middle">4</text>
  <text x="740" y="268" class="flow-label">replay</text>

  <!-- ======== CONTROL / LIVE FLOW ARROWS (gray solid) ======== -->

  <!-- Clients → Capture Proxy -->
  <path d="M156,97 L186,97 L186,323 L240,323" class="arrow-control"/>
  <text x="191" y="210" class="ctrl-label">requests</text>

  <!-- Capture Proxy → Source (pass-through) -->
  <path d="M308,356 L308,386 L170,386 L170,262 L156,262" class="arrow-control"/>
  <text x="190" y="379" class="ctrl-label">pass-through</text>

  <!-- Capture Proxy → Kafka (record) -->
  <path d="M376,323 L400,323" class="arrow-control"/>
  <text x="380" y="316" class="ctrl-label">record</text>

  <!-- Kafka → Traffic Replayer (consume) -->
  <path d="M530,323 L556,323" class="arrow-control"/>
  <text x="534" y="316" class="ctrl-label">consume</text>

  <!-- ======== LEGEND ======== -->
  <g transform="translate(580, 448)">
    <rect x="0" y="0" width="348" height="104" rx="10" class="fill-card"/>
    <rect x="0" y="0" width="348" height="104" rx="10" fill="none" class="border-card" stroke-width="1"/>

    <text x="16" y="22" class="legend-title">Legend</text>

    <line x1="16" y1="44" x2="52" y2="44" stroke-width="2" stroke-dasharray="7 4" stroke="light-dark(#2563eb, #3b82f6)" fill="none"/>
    <text x="60" y="48" class="legend-text">Data flow (backfill + replay)</text>

    <line x1="16" y1="64" x2="52" y2="64" stroke-width="1.5" stroke="light-dark(#94a3b8, #475569)" fill="none"/>
    <text x="60" y="68" class="legend-text">Control / live traffic</text>

    <circle cx="24" cy="88" r="8" fill="url(#grad-blue)"/>
    <text x="24" y="92" class="step-num" text-anchor="middle">N</text>
    <text x="40" y="92" class="legend-text">Numbered steps in migration sequence</text>
  </g>
</svg>