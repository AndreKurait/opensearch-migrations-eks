<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 540" fill="none">
  <style>
    :root {
      color-scheme: light dark;
    }
    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }

    /* Adaptive colors using light-dark() */
    .bg-main { fill: light-dark(#f8fafc, #0f1724); }
    .border-cluster { stroke: light-dark(#cbd5e1, #1e3a5f); }
    .fill-card { fill: light-dark(#ffffff, #1a2744); }
    .border-card { stroke: light-dark(#d1d9e6, #2d4a6f); }
    .fill-card-accent { fill: light-dark(#f0f7ff, #0d2847); }
    .border-accent { stroke: light-dark(#3b82f6, #3b82f6); }
    .fill-external { fill: light-dark(#f9fafb, #1c1c2e); }
    .border-external { stroke: light-dark(#9ca3af, #475569); }
    .fill-managed-bg { fill: light-dark(rgba(59,130,246,0.04), rgba(0,94,184,0.06)); }
    .border-managed { stroke: light-dark(#bfdbfe, #1e3a5f); }

    .label { font-size: 13px; fill: light-dark(#1e293b, #e2e8f0); font-weight: 600; }
    .sublabel { font-size: 10px; fill: light-dark(#64748b, #94a3b8); }
    .group-label { font-size: 10.5px; fill: light-dark(#6b7280, #64748b); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; }
    .step-num { font-size: 10px; fill: #ffffff; font-weight: 700; }
    .legend-text { font-size: 10.5px; fill: light-dark(#475569, #94a3b8); }

    .arrow-control {
      stroke: light-dark(#94a3b8, #475569);
      stroke-width: 1.5;
      fill: none;
      marker-end: url(#ah-ctrl);
    }
    .arrow-data {
      stroke: light-dark(#2563eb, #3b82f6);
      stroke-width: 2;
      fill: none;
      stroke-dasharray: 7 4;
      marker-end: url(#ah-data);
    }
    .arrow-ctrl-color { fill: light-dark(#94a3b8, #475569); }
    .arrow-data-color { fill: light-dark(#2563eb, #3b82f6); }

    .shadow-card { filter: url(#card-shadow); }

    /* Hover states for interactivity hint */
    .node-group:hover .fill-card,
    .node-group:hover .fill-card-accent,
    .node-group:hover .fill-external {
      filter: brightness(1.04);
    }
  </style>

  <defs>
    <marker id="ah-ctrl" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" class="arrow-ctrl-color"/>
    </marker>
    <marker id="ah-data" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0.5 L7,3 L0,5.5" class="arrow-data-color"/>
    </marker>

    <linearGradient id="grad-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>

    <filter id="card-shadow" x="-6%" y="-6%" width="112%" height="120%">
      <feDropShadow dx="0" dy="1" stdDeviation="3" flood-color="#000" flood-opacity="0.12"/>
    </filter>
  </defs>

  <!-- ======== BACKGROUND ======== -->
  <rect width="920" height="540" rx="14" class="bg-main"/>

  <!-- ======== CLIENTS (external, top-left) ======== -->
  <g class="node-group">
    <rect x="32" y="72" width="116" height="48" rx="10" class="fill-external shadow-card"/>
    <rect x="32" y="72" width="116" height="48" rx="10" class="border-external" fill="none" stroke-width="1.5"/>
    <text x="90" y="101" class="label" text-anchor="middle">Clients</text>
  </g>

  <!-- ======== SOURCE (external, left) ======== -->
  <g class="node-group">
    <rect x="32" y="208" width="116" height="64" rx="10" class="fill-external shadow-card"/>
    <rect x="32" y="208" width="116" height="64" rx="10" class="border-external" fill="none" stroke-width="1.5"/>
    <text x="90" y="236" class="label" text-anchor="middle">Source</text>
    <text x="90" y="252" class="sublabel" text-anchor="middle">ES / OpenSearch</text>
  </g>

  <!-- ======== OBJECT STORAGE (external, bottom-left) ======== -->
  <g class="node-group">
    <rect x="32" y="408" width="116" height="64" rx="10" class="fill-external shadow-card"/>
    <rect x="32" y="408" width="116" height="64" rx="10" class="border-external" fill="none" stroke-width="1.5"/>
    <text x="90" y="436" class="label" text-anchor="middle">Object Storage</text>
    <text x="90" y="452" class="sublabel" text-anchor="middle">S3 / GCS / MinIO</text>
  </g>

  <!-- ======== TARGET (external, right) ======== -->
  <g class="node-group">
    <rect x="762" y="208" width="126" height="64" rx="10" class="fill-card-accent shadow-card"/>
    <rect x="762" y="208" width="126" height="64" rx="10" fill="none" stroke="url(#grad-blue)" stroke-width="2"/>
    <text x="825" y="236" class="label" text-anchor="middle">Target</text>
    <text x="825" y="252" class="sublabel" text-anchor="middle">OpenSearch</text>
  </g>

  <!-- ======== KUBERNETES CLUSTER BOUNDARY ======== -->
  <rect x="184" y="32" width="548" height="352" rx="12" fill="none" class="border-cluster" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="204" y="52" class="group-label">Kubernetes Cluster</text>

  <!-- ======== TOP ROW: Console, Argo, Monitoring ======== -->

  <!-- Migration Console -->
  <g class="node-group">
    <rect x="210" y="68" width="148" height="56" rx="10" class="fill-card shadow-card"/>
    <rect x="210" y="68" width="148" height="56" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="284" y="93" class="label" text-anchor="middle">Migration Console</text>
    <text x="284" y="110" class="sublabel" text-anchor="middle">StatefulSet · CLI</text>
  </g>

  <!-- Argo Workflows -->
  <g class="node-group">
    <rect x="380" y="68" width="148" height="56" rx="10" class="fill-card shadow-card"/>
    <rect x="380" y="68" width="148" height="56" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="454" y="93" class="label" text-anchor="middle">Argo Workflows</text>
    <text x="454" y="110" class="sublabel" text-anchor="middle">Server + Controller</text>
  </g>

  <!-- Monitoring -->
  <g class="node-group">
    <rect x="550" y="68" width="148" height="56" rx="10" class="fill-card shadow-card"/>
    <rect x="550" y="68" width="148" height="56" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="624" y="93" class="label" text-anchor="middle">Monitoring</text>
    <text x="624" y="110" class="sublabel" text-anchor="middle">OTel · Grafana</text>
  </g>

  <!-- Console → Argo arrow -->
  <path d="M358,96 L380,96" class="arrow-control"/>

  <!-- ======== MANAGED BY ARGO REGION ======== -->
  <rect x="210" y="148" width="510" height="220" rx="10" class="fill-managed-bg border-managed" stroke-width="1" stroke-dasharray="5 3"/>
  <text x="230" y="168" class="group-label">Managed by Argo Workflows</text>

  <!-- RFS Workers -->
  <g class="node-group">
    <rect x="232" y="190" width="130" height="62" rx="10" class="fill-card-accent shadow-card"/>
    <rect x="232" y="190" width="130" height="62" rx="10" fill="none" class="border-accent" stroke-width="1.5"/>
    <text x="297" y="216" class="label" text-anchor="middle">RFS Workers</text>
    <text x="297" y="233" class="sublabel" text-anchor="middle">Jobs · 1 per shard</text>
  </g>

  <!-- Capture Proxy -->
  <g class="node-group">
    <rect x="390" y="190" width="130" height="62" rx="10" class="fill-card-accent shadow-card"/>
    <rect x="390" y="190" width="130" height="62" rx="10" fill="none" class="border-accent" stroke-width="1.5"/>
    <text x="455" y="216" class="label" text-anchor="middle">Capture Proxy</text>
    <text x="455" y="233" class="sublabel" text-anchor="middle">Deployment + Svc</text>
  </g>

  <!-- Traffic Replayer -->
  <g class="node-group">
    <rect x="548" y="190" width="138" height="62" rx="10" class="fill-card-accent shadow-card"/>
    <rect x="548" y="190" width="138" height="62" rx="10" fill="none" class="border-accent" stroke-width="1.5"/>
    <text x="617" y="216" class="label" text-anchor="middle">Traffic Replayer</text>
    <text x="617" y="233" class="sublabel" text-anchor="middle">Deployment</text>
  </g>

  <!-- Kafka -->
  <g class="node-group">
    <rect x="390" y="284" width="130" height="52" rx="10" class="fill-card shadow-card"/>
    <rect x="390" y="284" width="130" height="52" rx="10" fill="none" class="border-card" stroke-width="1"/>
    <text x="455" y="307" class="label" text-anchor="middle">Kafka</text>
    <text x="455" y="323" class="sublabel" text-anchor="middle">Strimzi / external</text>
  </g>

  <!-- ======== DATA FLOW ARROWS (blue dashed) ======== -->

  <!-- ① Source → Object Storage (snapshot) -->
  <path d="M90,272 L90,408" class="arrow-data"/>
  <text x="98" y="346" class="sublabel">snapshot</text>
  <circle cx="90" cy="340" r="10" fill="url(#grad-blue)"/>
  <text x="90" y="344" class="step-num" text-anchor="middle">1</text>

  <!-- ② Object Storage → RFS Workers (Lucene files) -->
  <path d="M148,440 L297,440 L297,252" class="arrow-data"/>
  <text x="184" y="432" class="sublabel">Lucene files</text>

  <!-- ③ RFS Workers → Target (bulk index) -->
  <path d="M297,190 L297,170 L825,170 L825,208" class="arrow-data"/>
  <text x="555" y="164" class="sublabel">bulk index</text>
  <circle cx="297" cy="170" r="10" fill="url(#grad-blue)"/>
  <text x="297" y="174" class="step-num" text-anchor="middle">2</text>

  <!-- ======== CONTROL / LIVE FLOW ARROWS (gray solid) ======== -->

  <!-- Clients → Capture Proxy (through) -->
  <path d="M148,96 L178,96 L178,221 L390,221" class="arrow-control"/>

  <!-- Capture Proxy → Source (pass-through) -->
  <path d="M455,252 L455,270 L170,270 L170,240 L148,240" class="arrow-control"/>
  <text x="260" y="264" class="sublabel">pass-through</text>

  <!-- Capture Proxy → Kafka -->
  <path d="M455,252 L455,284" class="arrow-control"/>

  <!-- Kafka → Traffic Replayer -->
  <path d="M520,310 L617,310 L617,252" class="arrow-control"/>

  <!-- Traffic Replayer → Target -->
  <path d="M686,221 L762,221" class="arrow-control"/>

  <!-- ======== STEP BADGES ======== -->
  <!-- Step 3 on Capture Proxy path -->
  <circle cx="455" cy="270" r="10" fill="url(#grad-blue)"/>
  <text x="455" y="274" class="step-num" text-anchor="middle">3</text>

  <!-- Step 4 on Target -->
  <circle cx="825" cy="170" r="10" fill="url(#grad-blue)"/>
  <text x="825" y="174" class="step-num" text-anchor="middle">4</text>

  <!-- ======== LEGEND ======== -->
  <g transform="translate(580, 420)">
    <rect x="0" y="0" width="300" height="90" rx="10" class="fill-card" opacity="0.8"/>
    <rect x="0" y="0" width="300" height="90" rx="10" fill="none" class="border-card" stroke-width="1"/>

    <text x="16" y="22" class="group-label">Legend</text>

    <line x1="16" y1="40" x2="48" y2="40" stroke-width="2" stroke-dasharray="7 4" class="arrow-data" style="marker-end:none"/>
    <text x="56" y="44" class="legend-text">Data flow</text>

    <line x1="150" y1="40" x2="182" y2="40" stroke-width="1.5" class="arrow-control" style="marker-end:none"/>
    <text x="190" y="44" class="legend-text">Control / live traffic</text>

    <text x="16" y="68" class="sublabel">① Snapshot  ② Metadata + Backfill</text>
    <text x="16" y="82" class="sublabel">③ Capture + Replay  ④ Bulk index to Target</text>
  </g>
</svg>
