<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 520">
  <style>
    text { font-family: Inter, system-ui, sans-serif; }
    .title { font-size: 14px; font-weight: 600; }
    .sub { font-size: 11px; }
    .group { font-size: 11px; font-weight: 700; letter-spacing: 0.06em; text-transform: uppercase; }
    .legend-text { font-size: 12px; }
    .flow-label { font-size: 12px; font-weight: 600; }
    .lane-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; }

    /* Light mode */
    .bg { fill: #f8fafc; }
    .title { fill: #1a2744; }
    .sub { fill: #5a6a7e; }
    .group { fill: #3a5070; }
    .legend-text { fill: #5a6a7e; }
    .flow-label { fill: #005eb8; }
    .flow-label-gray { fill: #5a6a7e; font-size: 12px; font-weight: 600; }
    .lane-label { fill: #8898a8; }
    .cluster-bg { fill: #f0f4f8; stroke: #c0d0e0; }
    .argo-zone { fill: #e8f0fe; stroke: #b0c8e8; }
    .argo-label { fill: #3a6090; }
    .box { fill: #fff; stroke: #d0d8e4; }
    .box-accent { fill: #fff; stroke: #005eb8; }
    .box-external { fill: #fff; stroke: #a0b0c0; }
    .box-target { fill: #e8f0fe; stroke: #005eb8; }
    .box-storage { fill: #fff; stroke: #a0b0c0; }
    .arrow-gray { stroke: #8898a8; }
    .arrow-blue { stroke: #005eb8; }
    .ah-gray { fill: #8898a8; }
    .ah-blue { fill: #005eb8; }
    .divider { stroke: #d0d8e0; }

    /* Dark mode */
    @media (prefers-color-scheme: dark) {
      .bg { fill: #131620; }
      .title { fill: #e0e6ed; }
      .sub { fill: #7a8a9a; }
      .group { fill: #7eb8e0; }
      .legend-text { fill: #7a8a9a; }
      .flow-label { fill: #5ab4f0; }
      .flow-label-gray { fill: #7a8a9a; }
      .lane-label { fill: #5a6a7a; }
      .cluster-bg { fill: #1a2030; stroke: #2a3a50; }
      .argo-zone { fill: #162038; stroke: #2a4060; }
      .argo-label { fill: #5a9ad0; }
      .box { fill: #1e2535; stroke: #2a3a50; }
      .box-accent { fill: #162038; stroke: #3080c0; }
      .box-external { fill: #1e2535; stroke: #3a4a5a; }
      .box-target { fill: #162038; stroke: #3080c0; }
      .box-storage { fill: #1e2535; stroke: #3a4a5a; }
      .arrow-gray { stroke: #4a5a6a; }
      .arrow-blue { stroke: #5ab4f0; }
      .ah-gray { fill: #4a5a6a; }
      .ah-blue { fill: #5ab4f0; }
      .divider { stroke: #2a3040; }
    }
  </style>

  <defs>
    <marker id="ag" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" class="ah-gray"/></marker>
    <marker id="ab" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" class="ah-blue"/></marker>
  </defs>

  <!-- Background -->
  <rect class="bg" width="880" height="520" rx="14"/>

  <!-- ═══════════════════════════════════════════
       LAYOUT: 3 horizontal swim lanes
       Lane 1 (y=30-170):  Capture & Replay flow  (Clients → Proxy → Source, Proxy → Kafka → Replayer → Target)
       Lane 2 (y=195-340): Backfill flow           (Source → Snapshot → Object Storage → RFS Workers → Target)
       Lane 3 (y=365-480): Infrastructure          (Console, Argo, Monitoring)
       ═══════════════════════════════════════════ -->

  <!-- ── Kubernetes Cluster boundary ── -->
  <rect class="cluster-bg" x="200" y="20" width="540" height="480" rx="14" stroke-width="1.5" stroke-dasharray="8 4"/>
  <text x="224" y="42" class="group">Kubernetes Cluster</text>

  <!-- ════════════ LANE 1: Capture & Replay ════════════ -->
  <text x="30" y="68" class="lane-label">capture</text>
  <text x="30" y="80" class="lane-label">&amp; replay</text>

  <!-- Clients (external left) -->
  <rect class="box-external" x="68" y="58" width="100" height="44" rx="8" stroke-width="1.2"/>
  <text x="118" y="80" class="title" text-anchor="middle">Clients</text>

  <!-- Capture Proxy -->
  <rect class="box-accent" x="230" y="58" width="130" height="44" rx="8" stroke-width="1.5"/>
  <text x="295" y="80" class="title" text-anchor="middle">Capture Proxy</text>

  <!-- Source (external left, below clients) -->
  <rect class="box-external" x="68" y="128" width="100" height="50" rx="8" stroke-width="1.2"/>
  <text x="118" y="150" class="title" text-anchor="middle">Source</text>
  <text x="118" y="164" class="sub" text-anchor="middle">ES / OpenSearch</text>

  <!-- Kafka -->
  <rect class="box" x="420" y="58" width="120" height="44" rx="8" stroke-width="1.2"/>
  <text x="480" y="80" class="title" text-anchor="middle">Kafka</text>

  <!-- Traffic Replayer -->
  <rect class="box-accent" x="600" y="58" width="120" height="44" rx="8" stroke-width="1.5"/>
  <text x="660" y="80" class="title" text-anchor="middle">Replayer</text>

  <!-- Target (external right) -->
  <rect class="box-target" x="780" y="100" width="80" height="130" rx="8" stroke-width="2"/>
  <text x="820" y="160" class="title" text-anchor="middle">Target</text>
  <text x="820" y="176" class="sub" text-anchor="middle">Open</text>
  <text x="820" y="188" class="sub" text-anchor="middle">Search</text>

  <!-- Lane 1 arrows — all horizontal, no crossings -->
  <!-- Clients → Proxy -->
  <line x1="168" y1="80" x2="228" y2="80" class="arrow-gray" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Proxy → Source (down-left) -->
  <path d="M295,102 L295,153 L168,153" fill="none" class="arrow-gray" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="220" y="146" class="flow-label-gray">forward</text>

  <!-- Proxy → Kafka -->
  <line x1="360" y1="80" x2="418" y2="80" class="arrow-gray" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="376" y="73" class="flow-label-gray">record</text>

  <!-- Kafka → Replayer -->
  <line x1="540" y1="80" x2="598" y2="80" class="arrow-gray" stroke-width="1.5" marker-end="url(#ag)"/>

  <!-- Replayer → Target -->
  <path d="M720,80 L760,80 L760,140 L778,140" fill="none" class="arrow-gray" stroke-width="1.5" marker-end="url(#ag)"/>
  <text x="740" y="73" class="flow-label-gray">replay</text>

  <!-- ── Divider ── -->
  <line class="divider" x1="30" y1="195" x2="760" y2="195" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ════════════ LANE 2: Backfill ════════════ -->
  <text x="30" y="230" class="lane-label">backfill</text>

  <!-- Argo-managed zone -->
  <rect class="argo-zone" x="380" y="210" width="350" height="120" rx="8" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="400" y="228" class="group argo-label">Managed by Argo</text>

  <!-- Object Storage (external) -->
  <rect class="box-storage" x="210" y="240" width="130" height="50" rx="8" stroke-width="1.2"/>
  <text x="275" y="262" class="title" text-anchor="middle">Object Storage</text>
  <text x="275" y="278" class="sub" text-anchor="middle">S3 / GCS / MinIO</text>

  <!-- RFS Workers -->
  <rect class="box-accent" x="400" y="245" width="140" height="52" rx="8" stroke-width="1.5"/>
  <text x="470" y="268" class="title" text-anchor="middle">RFS Workers</text>
  <text x="470" y="284" class="sub" text-anchor="middle">Jobs · 1 per shard</text>

  <!-- Lane 2 arrows — clean left-to-right -->
  <!-- Source → Object Storage (snapshot) -->
  <path d="M118,178 L118,265 L208,265" fill="none" class="arrow-blue" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#ab)"/>
  <text x="130" y="230" class="flow-label">snapshot</text>

  <!-- Object Storage → RFS Workers -->
  <line x1="340" y1="265" x2="398" y2="265" class="arrow-blue" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#ab)"/>
  <text x="350" y="258" class="flow-label">Lucene</text>

  <!-- RFS → Target -->
  <path d="M540,270 L760,270 L760,195 L778,195" fill="none" class="arrow-blue" stroke-width="2" stroke-dasharray="6 3" marker-end="url(#ab)"/>
  <text x="610" y="262" class="flow-label">bulk index</text>

  <!-- ── Divider ── -->
  <line class="divider" x1="200" y1="355" x2="740" y2="355" stroke-width="1" stroke-dasharray="3 3"/>

  <!-- ════════════ LANE 3: Infrastructure ════════════ -->
  <text x="30" y="400" class="lane-label">infra</text>

  <rect class="box" x="230" y="375" width="140" height="50" rx="8" stroke-width="1.2"/>
  <text x="300" y="397" class="title" text-anchor="middle">Migration Console</text>
  <text x="300" y="413" class="sub" text-anchor="middle">StatefulSet</text>

  <rect class="box" x="420" y="375" width="140" height="50" rx="8" stroke-width="1.2"/>
  <text x="490" y="397" class="title" text-anchor="middle">Argo Workflows</text>
  <text x="490" y="413" class="sub" text-anchor="middle">Server + Controller</text>

  <rect class="box" x="610" y="375" width="120" height="50" rx="8" stroke-width="1.2"/>
  <text x="670" y="397" class="title" text-anchor="middle">Monitoring</text>
  <text x="670" y="413" class="sub" text-anchor="middle">OTel · Grafana</text>

  <!-- ════════════ LEGEND ════════════ -->
  <line class="arrow-blue" x1="40" y1="475" x2="75" y2="475" stroke-width="2" stroke-dasharray="6 3"/>
  <text x="82" y="479" class="legend-text">Data flow</text>
  <line class="arrow-gray" x1="170" y1="475" x2="205" y2="475" stroke-width="1.5"/>
  <text x="212" y="479" class="legend-text">Control flow</text>
  <rect class="cluster-bg" x="310" y="468" width="16" height="16" rx="3" stroke-width="1" stroke-dasharray="3 2"/>
  <text x="332" y="480" class="legend-text">Kubernetes boundary</text>
</svg>
